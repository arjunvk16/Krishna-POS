<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishna Hotel - Modern POS</title>
    <!-- Bill download madalu html2pdf library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Premium Dark Theme Variables (Banna mattu vinyasa) */
        :root {
            --primary: #f97316;
            --primary-hover: #ea580c;
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent: #10b981;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-glow: 0 0 20px rgba(249, 115, 22, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* App Vinyasa */
        .app-container {
            display: flex;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            gap: 24px;
        }

        /* Yedabhaga: Main Menu */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--surface), rgba(30, 41, 59, 0.5));
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            font-size: 2.5rem;
            background: rgba(249, 115, 22, 0.2);
            padding: 10px;
            border-radius: 12px;
        }

        header h1 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 500;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            padding-bottom: 100px; /* Mobile footer gaagi sthala */
        }

        /* Modern Menu Item Card */
        .menu-item {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-glow);
            background: var(--surface-hover);
        }

        .item-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .item-emoji {
            font-size: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .item-price {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.2rem;
        }

        /* Pramana Controls */
        .quantity-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            border-radius: var(--radius-md);
            padding: 6px;
            border: 1px solid var(--border-color);
        }

        .qty-btn {
            background: var(--surface);
            color: var(--text-main);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .qty-btn:hover {
            background: var(--primary);
            color: white;
        }

        .qty-btn:active {
            transform: scale(0.9);
        }

        /* Input explicitly editable */
        .qty-input {
            width: 70px;
            height: 40px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            background: rgba(0,0,0,0.3);
            border: 2px solid transparent;
            color: var(--text-main);
            border-radius: 8px;
            outline: none;
            transition: all 0.2s;
            cursor: text;
        }

        .qty-input:hover {
            background: rgba(0,0,0,0.5);
        }

        .qty-input:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        .qty-input::-webkit-inner-spin-button, 
        .qty-input::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        /* Balabhaga: Order Summary (Desktop gaagi Sidebar) */
        .sidebar {
            width: 380px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 20px;
            height: calc(100vh - 40px);
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border-color);
        }

        .cart-item-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .cart-item-qty {
            color: var(--primary);
            font-weight: 700;
            margin-left: 8px;
            font-size: 0.9rem;
        }

        .cart-item-total {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .empty-cart {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
            font-style: italic;
        }

        .sidebar-footer {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-color);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .total-label {
            font-size: 1.2rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .total-amount {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent);
        }

        .download-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }

        .download-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
        }

        /* Search Bar mattu Reset Button Styles */
        .search-box {
            width: 100%;
            padding: 16px 20px;
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-main);
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2);
        }

        .action-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .reset-btn {
            background: transparent;
            color: #ef4444; /* Destructive red */
            border: 1px solid #ef4444;
            padding: 12px 16px;
            font-size: 1.2rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .reset-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: translateY(-2px);
        }

        /* Mobile Sticky Footer */
        .mobile-footer {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            padding: 15px 20px;
            z-index: 100;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
                padding: 15px;
            }
            .sidebar {
                display: none; /* Mobile nalli sidebar hide madi */
            }
            .mobile-footer {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .menu-grid {
                grid-template-columns: 1fr; /* Single column */
            }
            .mobile-total-wrapper {
                display: flex;
                flex-direction: column;
            }
            .mobile-footer .download-btn {
                width: auto;
                padding: 12px 24px;
            }
        }

        /* FIX: PDF RECEIPT TEMPLATE ALIGNMENT */
        #receipt-container {
            display: none;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            background: white !important;
            color: black !important;
            width: 280px;
            box-sizing: border-box;
            margin: 0 auto;
        }
        
        #receipt-container * { 
            color: black !important; 
            border-color: black !important; 
            box-sizing: border-box; 
        }

        .receipt-header { 
            text-align: center; 
            border-bottom: 2px dashed black; 
            padding-bottom: 12px; 
            margin-bottom: 12px; 
        }
        .receipt-header h2 { margin: 0 0 5px 0; font-size: 20px; font-weight: bold; }
        .receipt-header p { margin: 0; font-size: 12px; }
        
        .receipt-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 12px; 
            table-layout: fixed; 
        }
        
        /* Column Widths */
        .receipt-table th:nth-child(1), .receipt-table td:nth-child(1) { width: 45%; }
        .receipt-table th:nth-child(2), .receipt-table td:nth-child(2) { width: 15%; text-align: center;}
        .receipt-table th:nth-child(3), .receipt-table td:nth-child(3) { width: 20%; text-align: right;}
        .receipt-table th:nth-child(4), .receipt-table td:nth-child(4) { width: 20%; text-align: right;}

        .receipt-table th { text-align: left; border-bottom: 1px dashed black; padding: 6px 0; font-size: 12px; }
        .receipt-table td { padding: 6px 0; font-size: 12px; word-wrap: break-word; }
        
        .receipt-total { 
            border-top: 2px dashed black; 
            padding-top: 12px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            font-size: 16px; 
        }
        
        .receipt-footer { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 11px; 
            border-top: 1px dashed black; 
            padding-top: 12px; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Yedabhaga: Main Menu -->
        <div class="main-content">
            <header>
                <div class="logo-icon">🪷</div>
                <div>
                    <h1>KRISHNA HOTEL</h1>
                    <p>Modern Point of Sale</p>
                </div>
            </header>

            <!-- Search Bar -->
            <input type="text" id="search-input" class="search-box" placeholder="🔍 Search menu items (e.g., Tea, Dosha)..." onkeyup="filterMenu()">

            <div class="menu-grid" id="menu-container">
                <!-- JS moolaka menu itemgalannu illi serisalaguttade -->
            </div>
        </div>

        <!-- Balabhaga: Desktop Sidebar Cart -->
        <div class="sidebar">
            <div class="sidebar-header">
                🛒 Current Order
            </div>
            <div class="cart-items" id="cart-items">
                <div class="empty-cart">No items selected</div>
            </div>
            <div class="sidebar-footer">
                <div class="total-row">
                    <span class="total-label">Total</span>
                    <span class="total-amount" id="display-total">₹0.00</span>
                </div>
                <div class="action-row">
                    <button class="reset-btn" onclick="resetCart()" title="Clear Order">
                        🗑️
                    </button>
                    <button class="download-btn" onclick="generatePDF()">
                        🖨️ Print Bill
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Sticky Footer -->
    <div class="mobile-footer">
        <div class="mobile-total-wrapper">
            <span style="font-size: 0.9rem; color: var(--text-muted);">Grand Total</span>
            <span style="font-size: 1.8rem; font-weight: 800; color: var(--accent);" id="mobile-display-total">₹0.00</span>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="reset-btn" onclick="resetCart()" style="border: none; background: rgba(239, 68, 68, 0.15);">🗑️</button>
            <button class="download-btn" onclick="generatePDF()">
                Print Bill
            </button>
        </div>
    </div>

    <!-- PDF Generate madalu Hidden Bill Template -->
    <div id="receipt-container">
        <div class="receipt-header">
            <h2>KRISHNA HOTEL</h2>
            <p>Authentic Taste</p>
            <p id="receipt-date" style="margin-top: 10px;"></p>
        </div>
        <table class="receipt-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="receipt-body"></tbody>
        </table>
        <div class="receipt-total">
            <span>TOTAL:</span>
            <span id="receipt-grand-total">₹0.00</span>
        </div>
        <div class="receipt-footer">
            <p>Thank you for dining with us!</p>
            <p>Visit Again</p>
        </div>
    </div>

    <script>
        // ==========================================
        // MENU DATA (Olley UI gaagi Icons add madalagide)
        // ==========================================
        const menuItems = [
            { id: 'porota', name: 'Porota', price: 14, icon: '🫓' },
            { id: 'tea', name: 'Tea', price: 14, icon: '🍵' },
            { id: 'coffee', name: 'Coffee', price: 20, icon: '☕' },
            { id: 'milk', name: 'Milk', price: 18, icon: '🥛' },
            { id: 'appam', name: 'Appam', price: 12, icon: '🥞' },
            { id: 'idiyappam', name: 'Idiyappam', price: 12, icon: '🥏' },
            { id: 'puttu', name: 'Puttu', price: 15, icon: '🥥' },
            { id: 'dosha', name: 'Dosha', price: 12, icon: '🌮' },
            { id: 'idili', name: 'Idili', price: 12, icon: '🥟' },
            { id: 'puri', name: 'Puri', price: 12, icon: '🍘' },
            { id: 'vada', name: 'Vada', price: 14, icon: '🍩' },
            { id: 'parippu_vada', name: 'Parippu Vada', price: 14, icon: '🧆' },
            { id: 'bonda', name: 'Bonda', price: 14, icon: '🍘' },
            { id: 'boli', name: 'Boli', price: 14, icon: '🥞' },
            { id: 'ulli_vada', name: 'Ulli Vada', price: 14, icon: '🧅' },
            { id: 'pattiri', name: 'Pattiri', price: 14, icon: '🫓' },
            { id: 'porota_roast', name: 'Porota Roast', price: 15, icon: '🌯' },
            { id: 'muttacurry', name: 'Mutta Curry', price: 35, icon: '🥚' },
            { id: 'kadala', name: 'Kadala Curry', price: 35, icon: '🧆' },
            { id: 'kizhangu_curry', name: 'Kizhangu Curry', price: 25, icon: '🥔' },
            { id: 'egg_kozhi', name: 'Egg Kozhi', price: 15, icon: '🍗' },
            { id: 'egg_kada', name: 'Egg Kada', price: 20, icon: '🥚' },
            { id: 'beef_fry_half', name: 'Beef Fry Half', price: 110, icon: '🥩' },
            { id: 'beef_fry_full', name: 'Beef Fry Full', price: 160, icon: '🥩' },
            { id: 'beef_curry_half', name: 'Beef Curry Half', price: 110, icon: '🍛' },
            { id: 'beef_curry_full', name: 'Beef Curry Full', price: 160, icon: '🍛' },
            { id: 'fish', name: 'Fish Curry', price: 60, icon: '🐟' },
            { id: 'fish_fry', name: 'Fish Fry', price: 40, icon: '🍤' },
            { id: 'biriyani', name: 'Biriyani', price: 100, icon: '🥘' },
            { id: 'biriyani_full', name: 'Biriyani Full', price: 150, icon: '🥘' },
            { id: 'meals', name: 'Meals', price: 70, icon: '🍱' }
        ];

        const orderQuantities = {};

        function initApp() {
            const container = document.getElementById('menu-container');
            
            menuItems.forEach(item => {
                orderQuantities[item.id] = 0; 

                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item';
                
                // onfocus="this.select()" use madiddare dodda numbers type madalu sulabha
                itemDiv.innerHTML = `
                    <div class="item-header">
                        <div class="item-emoji">${item.icon}</div>
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">₹${item.price.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="quantity-controls">
                        <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                        <input type="number" 
                               id="qty-${item.id}" 
                               class="qty-input" 
                               value="0" min="0" 
                               onchange="manualInput('${item.id}')" 
                               onclick="this.select()" 
                               onfocus="this.select()" 
                               aria-label="Quantity for ${item.name}">
                        <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                    </div>
                `;
                container.appendChild(itemDiv);
            });
        }

        function updateQty(id, change) {
            const input = document.getElementById(`qty-${id}`);
            let newQty = parseInt(input.value) + change;
            if (newQty < 0) newQty = 0;
            input.value = newQty;
            orderQuantities[id] = newQty;
            calculateTotal();
        }

        function manualInput(id) {
            const input = document.getElementById(`qty-${id}`);
            let val = parseInt(input.value);
            if (isNaN(val) || val < 0) val = 0;
            input.value = val;
            orderQuantities[id] = val;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            const cartContainer = document.getElementById('cart-items');
            cartContainer.innerHTML = ''; // Sidebar clear madi
            let hasItems = false;

            menuItems.forEach(item => {
                const qty = orderQuantities[item.id];
                if (qty > 0) {
                    hasItems = true;
                    const itemTotal = qty * item.price;
                    total += itemTotal;
                    
                    // Sidebar Cart UI update madi
                    cartContainer.innerHTML += `
                        <div class="cart-item">
                            <div class="cart-item-name">
                                ${item.name} <span class="cart-item-qty">x${qty}</span>
                            </div>
                            <div class="cart-item-total">₹${itemTotal.toFixed(2)}</div>
                        </div>
                    `;
                }
            });

            if (!hasItems) {
                cartContainer.innerHTML = '<div class="empty-cart">No items selected</div>';
            }
            
            const formattedTotal = total.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('display-total').innerText = `₹${formattedTotal}`;
            document.getElementById('mobile-display-total').innerText = `₹${formattedTotal}`;
            
            return total;
        }

        function generatePDF() {
            const totalAmount = calculateTotal();
            
            if (totalAmount === 0) {
                alert("Please add at least one item to generate a bill.");
                return;
            }

            const receiptBody = document.getElementById('receipt-body');
            receiptBody.innerHTML = ''; 
            
            const now = new Date();
            const dateString = now.toLocaleDateString('en-IN');
            const timeString = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('receipt-date').innerText = `${dateString} | ${timeString}`;

            menuItems.forEach(item => {
                const qty = orderQuantities[item.id];
                if (qty > 0) {
                    const itemTotal = qty * item.price;
                    receiptBody.innerHTML += `
                        <tr>
                            <td>${item.name}</td>
                            <td>${qty}</td>
                            <td>${item.price}</td>
                            <td>${itemTotal.toFixed(2)}</td>
                        </tr>
                    `;
                }
            });

            const formattedTotalAmount = totalAmount.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('receipt-grand-total').innerText = `₹${formattedTotalAmount}`;

            const receiptElement = document.getElementById('receipt-container');
            receiptElement.style.display = 'block';

            // PDF options
            const opt = {
                margin:       0.1,
                filename:     `KrishnaHotel_Bill_${Date.now()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, backgroundColor: '#ffffff' },
                jsPDF:        { unit: 'in', format: [3.5, 11], orientation: 'portrait' } 
            };

            html2pdf().set(opt).from(receiptElement).save().then(() => {
                receiptElement.style.display = 'none';
            });
        }

        // Search Filter Logic
        function filterMenu() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.menu-item');
            
            items.forEach(item => {
                const name = item.querySelector('.item-name').innerText.toLowerCase();
                if (name.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Reset Cart Logic
        function resetCart() {
            // Cart khali idere check madi
            let isEmpty = true;
            for (let id in orderQuantities) {
                if (orderQuantities[id] > 0) isEmpty = false;
            }
            if (isEmpty) return; 

            // Confirmation keli
            if (confirm("Are you sure you want to clear the current bill?")) {
                // Ella quantities 0 ge reset madi
                menuItems.forEach(item => {
                    orderQuantities[item.id] = 0;
                    document.getElementById(`qty-${item.id}`).value = 0;
                });
                
                // Sidebar UI clear madalu recalculate madi
                calculateTotal();
                
                // Search box annu clear madi
                const searchBox = document.getElementById('search-input');
                if (searchBox.value !== '') {
                    searchBox.value = '';
                    filterMenu();
                }
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
